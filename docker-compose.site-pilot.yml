services:
  tender-pilot:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      AI_CORP_DATABASE_URL: sqlite:///./data/ai_corporation.db
      AI_CORP_DEBUG: "false"
      AI_CORP_ALLOWED_HOSTS: localhost,127.0.0.1
      AI_CORP_CORS_ALLOW_ORIGINS: ""
      AI_CORP_TENDER_PILOT_BASIC_AUTH_ENABLED: "false"
      AI_CORP_LLM_PROVIDER: stub
      AI_CORP_LLM_ALLOW_RAW_PARTNER_DATA: "false"
      AI_CORP_LLM_STORE_RAW_RESPONSE: "false"
    volumes:
      - tender_pilot_data:/app/data

  arvectum-site:
    image: nginx:1.27-alpine
    depends_on:
      - tender-pilot
    ports:
      - "${ARVECTUM_SITE_PORT:-8081}:80"
    volumes:
      - ./arvectum-landing/public:/usr/share/nginx/html:ro
      - ./ops/nginx/arvectum-site-pilot.local.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  tender_pilot_data:

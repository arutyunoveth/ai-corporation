server {
  listen 8080; server_name pilot.arvectum.com localhost 127.0.0.1;
  client_max_body_size 32m;
  location = /health/tender-agent { proxy_pass http://pilot-api:8000/health; proxy_set_header Host $host; }
  location ~ ^/(docs|redoc|openapi\.json) { return 404; }
  location ~ ^/(pilot|demo)/tender-agent { proxy_pass http://pilot-api:8000; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_read_timeout 300s; proxy_buffering off; }
  location ^~ /api/demo/tender-agent/ { proxy_pass http://pilot-api:8000; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_read_timeout 300s; proxy_buffering off; }
  location / { return 404; }
}

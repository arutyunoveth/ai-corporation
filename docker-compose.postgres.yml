name: arvectum-postgres
services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: arvectum-postgres
    env_file:
      - .env.local
    environment:
      POSTGRES_DB: ${ARVECTUM_POSTGRES_DB:-arvectum}
      POSTGRES_USER: ${ARVECTUM_POSTGRES_USER:-arvectum}
      POSTGRES_PASSWORD: ${ARVECTUM_POSTGRES_PASSWORD:?set in .env.local}
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - arvectum_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ARVECTUM_POSTGRES_USER:-arvectum} -d ${ARVECTUM_POSTGRES_DB:-arvectum}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  arvectum_postgres_data:

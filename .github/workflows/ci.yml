name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      # The PDF renderer regression test verifies generated text with pdftotext.
      - run: sudo apt-get update && sudo apt-get install --yes poppler-utils
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: make check
      - run: make test
  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: python -m pip install -e .
      - run: alembic heads
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python scripts/ops/secret_scan.py
  r8-postgres-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: sudo apt-get update && sudo apt-get install --yes poppler-utils
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: make test-r8-postgres
  r8-acceptance-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: sudo apt-get update && sudo apt-get install --yes poppler-utils
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: make test-r8-acceptance-tenant-concurrency
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: r8-tenant-concurrency-evidence-${{ github.sha }}
          path: output/r8-acceptance-tenant-concurrency-*/

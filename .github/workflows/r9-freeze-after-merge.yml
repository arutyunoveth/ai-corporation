name: R9 freeze evidence recorder

on:
  push:
    branches:
      - codex/r9-operational-hardening

permissions:
  actions: read
  contents: write

jobs:
  record:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/r9-operational-hardening
          fetch-depth: 0
      - name: Record post-merge CI and annotated tag evidence
        env:
          GH_TOKEN: ${{ github.token }}
          MERGE_SHA: 58bef2da2342bff1e6f63215ee2697e96fefe6f7
          TAG_NAME: r9-operational-hardening-2026-07-24
        run: |
          set -euo pipefail

          runs_json=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${MERGE_SHA}&event=push&per_page=20")
          run_id=$(jq -r '.workflow_runs | map(select(.name == "CI")) | sort_by(.created_at) | last | .id // empty' <<<"$runs_json")
          if [[ -z "$run_id" ]]; then
            echo "No post-merge CI run found for ${MERGE_SHA}" >&2
            exit 1
          fi

          status=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq '.status')
          conclusion=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq '.conclusion // ""')
          if [[ "$status" != "completed" || "$conclusion" != "success" ]]; then
            echo "Post-merge CI is not green: run=${run_id} status=${status} conclusion=${conclusion}" >&2
            exit 1
          fi

          jobs_json=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100")
          job_count=$(jq '.jobs | length' <<<"$jobs_json")
          failed_jobs=$(jq '[.jobs[] | select(.status != "completed" or .conclusion != "success")] | length' <<<"$jobs_json")
          if [[ "$job_count" -ne 5 || "$failed_jobs" -ne 0 ]]; then
            echo "Unexpected post-merge job set: count=${job_count} failed=${failed_jobs}" >&2
            jq '.jobs | map({name,status,conclusion})' <<<"$jobs_json" >&2
            exit 1
          fi

          git fetch origin main --tags
          tag_type=$(git cat-file -t "refs/tags/${TAG_NAME}")
          if [[ "$tag_type" != "tag" ]]; then
            echo "${TAG_NAME} is not an annotated tag" >&2
            exit 1
          fi
          tag_object=$(git rev-parse "refs/tags/${TAG_NAME}")
          peeled=$(git rev-parse "${TAG_NAME}^{}")
          if [[ "$peeled" != "$MERGE_SHA" ]]; then
            echo "Tag peels to ${peeled}, expected ${MERGE_SHA}" >&2
            exit 1
          fi

          mkdir -p docs/evidence
          jq -n \
            --arg status_marker "R9_OPERATIONAL_HARDENING_MERGED_TAGGED_AND_POST_MERGE_VERIFIED" \
            --arg merge_commit "$MERGE_SHA" \
            --argjson workflow_run_id "$run_id" \
            --arg workflow_status "$status" \
            --arg workflow_conclusion "$conclusion" \
            --arg tag_name "$TAG_NAME" \
            --arg tag_object "$tag_object" \
            --arg peeled_commit "$peeled" \
            --argjson jobs "$(jq '[.jobs | sort_by(.name)[] | {name,status,conclusion}]' <<<"$jobs_json")" \
            '{status_marker:$status_marker,merge_commit:$merge_commit,post_merge_ci:{run_id:$workflow_run_id,status:$workflow_status,conclusion:$workflow_conclusion,jobs:$jobs},annotated_tag:{name:$tag_name,tag_object:$tag_object,peeled_commit:$peeled_commit}}' \
            > docs/evidence/r9-freeze-result.json

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/evidence/r9-freeze-result.json
          git commit -m 'docs(r9): record post-merge freeze evidence'
          git push origin HEAD:codex/r9-operational-hardening
